# config/substack_subscriptions.yaml
# Path A v3 Substack channel — the 20-publication v1 list.
#
# Consumed by scripts/v3_ingest/substacks.py to match an inbound newsletter's
# From header to publication metadata (tier, themes). Matching is best-effort: an
# unmatched sender is still ingested (publication: unknown) — never dropped.
#
# Per-pub fields:
#   name             display name (-> publication slug in note filenames)
#   url              canonical publication URL (web)
#   sender_patterns  case-insensitive substrings matched against the full From
#                    header (email + display name). Most Substack-hosted pubs send
#                    from "<slug>@substack.com" REGARDLESS of a custom web domain;
#                    self-hosted/non-Substack pubs send from their own domain.
#   tier             free | paid | free_plus_paid
#   status           subscribed | action_required | skip   (operator-maintained)
#   default_themes   chunker hints (best-guess; the LLM still extracts per-post)
#   notes            provenance / open decisions
#
# Gmail filter (see scripts/mac_setup/SUBSTACK_GMAIL_SETUP.md) routes all of these
# to the "Substack" label, skipping inbox so the transcript poller never sees them.
#
# verified 2026-06-24 via web search (URLs + sending domains).

