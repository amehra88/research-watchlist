# /root/research-watchlist/config/watchlist.yaml  (canonical location after 2026-06-01 symlink flip)
#
# Master watchlist + theme vocabulary for the research intelligence system.
# See DESIGN.md §4 for full rationale.
#
# Editing:
#   - Primary: SSH to droplet → `claude` → natural-language commands (§4.4).
#   - Mobile fallback: email with subject WATCHLIST + body commands.
#
# Manual vs. auto:
#   tier_1_bctk membership: AUTO (BCTK scraper, Phase 1 step 5).
#   tier_2_active_candidates / tier_3_watchlist membership: MANUAL.
#   themes (master vocabulary): MANUAL.
#   themes / notes per ticker (any tier): MANUAL.
#
# This file holds AUTHORED data only — ticker, themes, added_date, tier
# membership, vocabulary, aliases, private_drivers, web_sources. Derived
# BCTK state (weight, last_synced, in_bctk, alias provenance) lives in
# /root/research/state/bctk_derived.yaml so daily cron Updates do not
# dirty this file.
#
# Scraper merge protocol for tier_1_bctk:
#   - Adds: new ticker on first appearance in BCTK; emits drift alert and
#     writes a new tier_1 entry here with empty themes. Operator fills in
#     themes/notes via WATCHLIST email.
#   - Updates: refresh weight + last_synced in state/bctk_derived.yaml only;
#     this file is not touched.
#   - Promotes: ticker found in BCTK that's also in tier_2/tier_3 is moved
#     here (themes/notes/added_date carried over verbatim); emits drift alert.
#   - Never removes: ticker leaving BCTK stays in tier_1_bctk; only its state
#     row flips to in_bctk:false. Emits drift alert; operator decides next step.

