    notes: "Promoted Tier 3 → Tier 2 on 2026-06-02 (operator). Custom-XPU / AI-networking play; thesis convergence with the silicon-displacement names (CBRS, GOOGL TPU, AMZN Trainium)."
    ai_positioning:
      score: "4"
      notes: "Clean AI-connectivity play; 76% of revenue from data center AI silicon (Q1 FY27 data center $1.83B, +27% y/y). Two-pronged growth thesis: (1) SCALE-OUT — custom XPU ($10B+ FY29 line of sight on a $55B TAM) plus the industry-first 102.4 Tbps AI/cloud switch announced 2026-06-01; (2) SCALE-UP via the Celestial AI Photonic Fabric (acquisition closed 2026-02-02, $3.25B; MRVL-guidance $500M run rate Q4 FY28 → $1B Q4 FY29) — optical-decoupled memory disaggregation enabling XPUs to access pooled memory multiple meters away at sub-150ns latency (functionally local from accelerator perspective). Eliminates 'stranded' per-server DRAM overprovisioning, a structural hyperscaler capex inefficiency. Below a 5 only because MRVL is neither the model layer nor the merchant-GPU layer — growth is leverage on others' capex — but it is a top-tier AI-infrastructure beneficiary across multiple product lines simultaneously. Murphy's Computex 2026-06-02 keynote articulated the underlying connectivity-as-AI-bottleneck thesis with a specific testable claim ('200G per lane is the last copper generation') driving the electrical→optical transition and co-packaged optics (CPO) as the density/power enabler; new product reveals include T100 'Teralink' 100T switch (possibly the productized name of the 2026-06-01 102.4 Tbps switch — not asserted as identical) and COLORZ 1600 4th-gen coherent silicon photonics for long-haul DCI. (source: 1Q27 note 2026-05-28; switch PR 2026-06-01; Celestial AI acquisition close 2026-02-02; operator Celestial AI technical detail 2026-06-02; Murphy Computex keynote notes/MRVL/20260602-conf-computex-murphy.md)"
    competitive_advantage:
      innovation_rate: "4+"
      distribution: "4"
      overall: "4"
      notes: "AI-connectivity leader consolidating a credible #2 custom-silicon position behind AVGO, on a two-pronged thesis: SCALE-OUT (1.6T optics, PAM4, custom XPU, 102.4 Tbps switch) and SCALE-UP (Celestial AI Photonic Fabric: optical decoupling enables physical separation of compute and memory by meters with sub-150ns latency, eliminating stranded-DRAM per-server overprovisioning). Innovation 4+ (raised from 4): the Photonic Fabric solves the memory-wall problem at structural rather than incremental scale — combining the three capabilities (physical decoupling + sub-150ns latency + pooled-memory economics) gives MRVL a moat dimension AVGO does not obviously match, layered on first-mover 1.6T optics, PAM4, silicon photonics (Polariton), and SRAM-based custom IP. Trajectory toward 5 if the photonic-fabric capability converts to MRVL-guided revenue at scale (Q4 FY28: $500M run rate; Q4 FY29: $1B). Distribution 4: all major US hyperscalers engaged, >50 active custom opportunities, NVIDIA NVLink Fusion partnership plus a $2B NVDA equity investment in MRVL (partnership + investment announced 2026-03-31). Competitive wedge vs AVGO — Murphy's Computex 'Switzerland of the industry / we work with everybody' neutral-multi-customer framing contrasts with AVGO's deeper single-customer custom-silicon entanglements; MRVL's multi-customer neutrality is the structural differentiator on the distribution axis. Overall 4 (not 4+/5): the photonic-fabric edge is acquired but not yet revenue-proven at scale; the moat compounds in design wins but is renewed every cycle, and AVGO competition caps below 5. The two components interact multiplicatively — innovation creates distribution, but distribution does not yet protect innovation. (source: 1Q27 note 2026-05-28; Celestial AI technical detail per operator 2026-06-02; Murphy Computex keynote notes/MRVL/20260602-conf-computex-murphy.md; NVIDIA 2026-03-31 release)"
    potential_investor_interest:
      score: "5"
      notes: "Hot AI-connectivity narrative with explicit CEO-level corroboration (Jensen 'next trillion dollar company' at Computex 2026-06-02). Stock +7% (6/1) then +14% (6/2) to $219.43, YTD +158.5%. Operator-anchor at 5 reflects momentum + sector heat + NVDA strategic-partnership halo. Caveat (NOT cap): $29.9M insider selling over 3mo against 258% one-year rally; COO sold $2M via pre-arranged 10b5-1 (adopted Jan 2026 — pre-planned, not signal). Factors: hot sector, earnings revisions, momentum, strategic-partnership halo. OPERATOR-PRIVATE SIGNAL: locked at 5 not 4+ to weight the Jensen public anchoring and connectivity-as-bottleneck thesis convergence over valuation caution."
    scoring_date: 2026-06-02
    scoring_notes: "Fully scored from T2 stub following Computex Taipei 2026-06-02 (Jensen Huang ~10-min surprise guest appearance at CEO Matt Murphy's keynote — an endorsement, publicly calling MRVL 'next trillion dollar company'; stock +14% to $219.43, YTD +158.5%) and the industry-first 102.4 Tbps AI/cloud switch announced 2026-06-01 (+7%). NB: Computex was the endorsement event, not the partnership announcement — the NVDA-MRVL NVLink Fusion partnership and $2B investment were announced earlier, 2026-03-31 (see below). Grounded in 1Q27 earnings note 2026-05-28 plus overnight news. Updated 2026-06-02 to raise innovation_rate 4→4+ on the Celestial AI Photonic Fabric capability (acquisition closed 2026-02-02, $3.25B; MRVL-guided $500M run rate Q4 FY28 → $1B Q4 FY29). OPERATOR-PRIVATE SIGNAL: Celestial AI Photonic Fabric is operator-flagged as substantial growth driver capturing a structural-moat dimension via three capabilities — (1) physical decoupling of compute and memory via optical signals (memory pools meters away, no copper-degradation limit), (2) sub-150ns latency (remote memory functionally local from accelerator perspective), (3) elimination of stranded per-server DRAM overprovisioning (pooled architecture changes hyperscaler capex economics). The three capabilities combine to address the AI 'memory wall' bottleneck at structural rather than incremental scale, a dimension AVGO does not obviously match. Overall held at 4 because acquired capability not yet revenue-proven at scale. NVDA strategic partnership anchored 2026-03-31 (NVIDIA newsroom release): NVLink Fusion co-integration (MRVL custom XPUs + NVLink-Fusion-compatible scale-up networking + silicon photonics; NVDA Vera CPU / ConnectX / BlueField / NVLink / Spectrum-X) PLUS a $2B NVDA equity investment in MRVL — the concrete scale behind the 'NVDA strategic-partnership halo' weighted in potential_investor_interest. (source: operator session 2026-06-02; Murphy Computex keynote notes/MRVL/20260602-conf-computex-murphy.md; NVIDIA 2026-03-31 release https://nvidianews.nvidia.com/news/nvidia-ai-ecosystem-expands-as-marvell-joins-forces-through-nvlink-fusion)"
