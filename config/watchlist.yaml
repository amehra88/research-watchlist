# ---------------------------------------------------------------------------
# Share-class / cross-listing aliases.
# Map of "BCTK ticker → canonical watchlist ticker." Auto-derive uses this for
# membership lookups: when BCTK reports symbol K and aliases[K] is set, the
# watchlist treats it as the canonical form. YAML entries always use the
# canonical form; drift alerts record the actual BCTK ticker for traceability.
#
# Initial entry: GOOG → GOOGL (Alphabet Class C → Class A unification).
# ---------------------------------------------------------------------------
aliases:
  GOOG: GOOGL

# ---------------------------------------------------------------------------
# Private companies whose trajectory materially affects the public portfolio.
# Not investable directly, but their capex, growth, and competitive moves
# flow through to the theses of named public Tier 1/2/3 entries.
#
# Used in two ways:
#   (1) Operator reference: keeps named private drivers visible alongside
#       public watchlist. When reading content about OpenAI capex, the
#       implications for AVGO, NVDA, MSFT etc. are visible at a glance.
#   (2) Phase 2 named-entity tagging: when podcast/Substack/article content
#       mentions one of these entities, the extraction layer cross-references
#       the `affects:` list to surface relevance to public tickers' briefings.
#
# `.pvt` identifier convention (this registry is the sole authority):
#   pvt_id  — canonical key, `<lowercased-name>.pvt` (e.g. openai.pvt). Use this
#             wherever a private needs to be addressed like a ticker: notes dirs
#             (`notes/<pvt_id>/`), document-index primary_ticker/subject_tickers,
#             and registered-private targets in supply-chain-manual.yaml.
#   name    — human display label (unchanged).
#   aliases — every spelling seen elsewhere in config, so a `name -> pvt_id`
#             resolver can be built from this file alone. In particular the
#             FactSet-extracted supply-chain.yaml uses entity-name variants
#             (e.g. "OpenAI Foundation", "Anthropic PBC"); those are NOT
#             hand-edited there — they resolve here via aliases.
#   A `.pvt` id MUST resolve to an entry below. Unregistered private mentions
#   (e.g. Cerebras, Grafana in supply-chain-manual.yaml) stay as bare names
#   until promoted into this registry. `.pvt` ids never enter the earnings-
#   transcript pipeline (privates have no public filings).
#
# Editing: manual, via Claude Code on droplet. No auto-derive.
# ---------------------------------------------------------------------------
private_drivers:
  - name: OpenAI
    pvt_id: openai.pvt
    aliases: ["OpenAI", "OpenAI Foundation", "OpenAI OpCo, LLC"]
    affects: [AVGO, NVDA, MSFT, GOOGL, META]
    notes: "Hyperscaler-equivalent capex behavior. Largest AI inference and training compute consumer. Custom XPU partnership with AVGO; primary NVDA GPU customer; MSFT Azure deployment partner; competitive pressure on GOOGL and META."
    added_date: 2026-05-10
  - name: Anthropic
    pvt_id: anthropic.pvt
    aliases: ["Anthropic", "Anthropic PBC"]
    affects: [AVGO, AMZN, GOOGL]
    notes: "Hyperscaler-equivalent capex behavior. Strategic AVGO custom-XPU customer; AMZN Trainium primary deployer; GOOGL TPU competitive proxy."
    added_date: 2026-05-10
  - name: xAI
    pvt_id: xai.pvt
    aliases: ["xAI"]
    affects: [NVDA, TSLA]
    notes: "Massive GPU cluster buildout (Colossus); TSLA cross-pollination on Grok models. NVDA-heavy customer."
    added_date: 2026-05-10
  - name: Bytedance
    pvt_id: bytedance.pvt
    aliases: ["Bytedance", "ByteDance", "ByteDance Ltd."]
    affects: [META]
    notes: "TikTok competitive dynamics affect META ad market share and engagement metrics. US regulatory trajectory is the swing variable."
    added_date: 2026-05-10
  - name: SpaceX
    pvt_id: spacex.pvt   # transitional — retire to ticker SPCX when the IPO prices (see SPCX note below)
    aliases: ["SpaceX", "Space Exploration Technologies Corp."]
    affects: [GEV]
    notes: "Starlink revenue and launch cadence reshape space economics. Indirect read-through to space-economy publics in Tier 3 if added later (RKLB, IRDM, ASTS)."
    added_date: 2026-05-10
  - name: Stripe
    pvt_id: stripe.pvt
    aliases: ["Stripe", "STRIPE, INC."]
    affects: [SHOP]
    notes: "B2B payments incumbent. SHOP merchant economics tied to payment-rail competition."
    added_date: 2026-05-10
  - name: Databricks
    pvt_id: databricks.pvt
    aliases: ["Databricks", "Databricks Inc."]
    affects: [SNOW, PLTR]
    notes: "Data platform competitive dynamics. Direct SNOW competitor on lakehouse positioning; PLTR Foundry overlap on enterprise data workflows."
    added_date: 2026-05-10

# ---------------------------------------------------------------------------
# External web sources to track over time. Includes company technical blogs,
# industry publications, and data/news trackers. Curated, not exhaustive.
#
# Fields:
#   url: canonical URL of the source
#   name: human-readable label for briefings
#   type: classification (company_blog | industry_publication | data_tracker
#         | research_blog | niche_news) — informs Phase 2 extractor design
#   affects: tickers (Tier 1/2/3) or private_drivers names this source informs
#   cadence: operator's intended check frequency (daily|weekly|monthly|on_event)
#            — non-binding documentation for Phase 2 schedule design
#   notes: why this source is on the list
#   added_date: when added
#
# Editing: manual, via Claude Code on droplet or WATCHLIST email. No auto-derive.
# Operator may add more over time; target list stays focused (~20-40 entries).
# ---------------------------------------------------------------------------
