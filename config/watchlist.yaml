  - name: SpaceX
    pvt_id: spacex.pvt   # transitional — retire to ticker SPCX when the IPO prices (~2026-06-11/12), promote to T1
    aliases: ["SpaceX", "Space Exploration Technologies Corp.", "Starlink", "xAI", "Grok", "SpaceXAI"]
    affects: [NVDA, GEV, TSLA]
    notes: "Starlink revenue + launch cadence reshape space economics (read-through to space-economy publics RKLB/IRDM/ASTS if added). NOW ALSO encompasses xAI: SpaceX acquired xAI 2026-02-02 (share exchange, 1 xAI -> 0.1433 SpaceX); May 2026 xAI was dissolved as a separate company — Grok and X moved under SpaceX's 'SpaceXAI' division. So SpaceX is also a frontier-model player (Grok — frontier_model_competition) and a major NVDA compute consumer (Colossus cluster; planned orbital data centers); TSLA cross-pollination on Grok. IPO imminent: confidential filing 2026-04-01, public S-1 out, expected price ~2026-06-11 / list ~06-12 at ~$1.8T (raise up to $75B). ON IPO -> rename this entry in place to the real ticker and promote to T1 (pre-IPO watchlist handoff). Absorbed former xai.pvt 2026-06-02. OPERATOR SIGNAL (2026-06-03, non-public, unverified): SpaceX has an agreement to acquire Cursor/Anysphere (best-of-breed AI coding-agent harness, ~$1.2B ARR), expected to close within 12 months — this would add a leading coding-agent harness to the SpaceXAI stack, giving SpaceX a position in agent_framework_landscape (harness axis) on top of frontier_model_competition. Track for confirmation; on close, fold Cursor exposure into the post-IPO SPCX entry rather than a standalone .pvt."
    added_date: 2026-05-10   # restructured 2026-06-02 to absorb xAI (formerly xai.pvt)
  - name: Stripe
    pvt_id: stripe.pvt
    aliases: ["Stripe", "STRIPE, INC."]
    affects: [SHOP]
    notes: "B2B payments incumbent. SHOP merchant economics tied to payment-rail competition."
    added_date: 2026-05-10
  - name: Databricks
    pvt_id: databricks.pvt
    aliases: ["Databricks", "Databricks Inc."]
    affects: [SNOW, PLTR]
    notes: "Data platform competitive dynamics. Direct SNOW competitor on lakehouse positioning; PLTR Foundry overlap on enterprise data workflows."
    added_date: 2026-05-10
  - name: Moonshot AI
    pvt_id: moonshot.pvt
    aliases: ["Moonshot AI", "Moonshot", "Kimi"]
    affects: [NVDA, MSFT, GOOGL, AMZN, META]
    notes: "Beijing frontier-model lab (Kimi open-weight LLMs), founded 2023. ~$2B raise at $20B valuation 2026-05 (Meituan-led); ARR >$200M; Kimi K2.6 a top-used model on OpenRouter. Chinese open-source displacement risk in frontier_model_competition — pressures US model-layer economics and shapes compute-demand allocation. 'Kimi' is the product brand."
    added_date: 2026-06-02
  - name: DeepSeek
    pvt_id: deepseek.pvt
    aliases: ["DeepSeek", "DeepSeek AI"]
    affects: [NVDA, MSFT, GOOGL, AMZN, META]
    notes: "Chinese frontier-model lab (High-Flyer-backed). V4-Pro/V4-Flash released 2026-04 under MIT license, benchmarking near GPT-5.5 / Claude Opus 4.7 at ~1/8th the price. Trained on Huawei Ascend (SMIC) — a deliberate shift away from NVDA, so both a model-layer displacement risk AND an NVDA compute-substitution signal. Key name in frontier_model_competition."
    added_date: 2026-06-02
  - name: Mistral AI
    pvt_id: mistral.pvt
    aliases: ["Mistral AI", "Mistral"]
    affects: [ASML, NVDA, MSFT, GOOGL, AMZN, META]
    notes: "French frontier-model lab (Paris, founded 2023); the principal European alternative to US labs. ~$14B valuation; ASML invested $1.5B for ~11% ownership (direct ASML tie). Building a Paris data center on 13,800 NVDA GB300 GPUs (200MW target by 2027). frontier_model_competition (European axis)."
    added_date: 2026-06-02
  - name: LangChain
    pvt_id: langchain.pvt
    aliases: ["LangChain", "LangChain Inc.", "LangGraph"]
    affects: [NET, GOOGL, NBIS]
    notes: "US agent-framework company (founded 2022, Harrison Chase). LangChain + LangGraph orchestration; ~90M monthly downloads, 35% of Fortune 500. $125M Series B at $1.25B valuation 2025-10 ($260M total). Central open-source player in agent_framework_landscape — competes with edge platforms (NET), Google (Antigravity), and neo-clouds (NBIS) for the orchestration layer above the model."
    added_date: 2026-06-02
  - name: Avicena
    pvt_id: avicena.pvt
    aliases: ["Avicena", "AvicenaTech", "AvicenaTech Corp", "Avicena Tech"]
    affects: [MRVL, COHR, LITE, TSM, 000660.KS, MU, 005930.KS]
